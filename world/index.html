<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Explorer</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../style-neu.css">
  <style>
    #country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 0.85rem;
      padding: 1rem 1.5rem 2rem;
      align-items: start;
    }

    .country-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s, border-color 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .country-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent-docs);
      opacity: 0.45;
      transition: opacity 0.2s;
    }

    .country-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      background: var(--glass-hover);
      border-color: var(--border-hover);
    }

    .country-card:hover::before { opacity: 1; }

    .country-flag {
      font-size: 2.8rem;
      line-height: 1;
      margin-bottom: 0.55rem;
      user-select: none;
    }

    .country-name {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .country-capital {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .continent-badge {
      position: absolute;
      top: 7px; right: 7px;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: var(--radius-sm);
    }

    .cb-africa       { background: rgba(245,158,11,0.15);  color: #fbbf24; }
    .cb-asia         { background: rgba(168,85,247,0.15);  color: #c084fc; }
    .cb-europe       { background: rgba(59,130,246,0.15);  color: #60a5fa; }
    .cb-namerica     { background: rgba(34,197,94,0.15);   color: #4ade80; }
    .cb-samerica     { background: rgba(6,182,212,0.15);   color: #22d3ee; }
    .cb-oceania      { background: rgba(239,68,68,0.15);   color: #f87171; }

    #result-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 0.5rem 1.5rem 0;
    }

    .hidden-card { display: none; }
  </style>
</head>
<body>

<header>
  <div class="header-title">World Explorer</div>
  <div class="header-sub">Alle Länder der Welt mit Flagge und Hauptstadt</div>
</header>

<div id="controls">
  <div id="search-wrapper">
    <input type="text" id="search" placeholder="Land oder Hauptstadt suchen…" autocomplete="off">
  </div>
  <select id="continentFilter">
    <option value="">Alle Kontinente</option>
    <option value="Africa">Afrika</option>
    <option value="Asia">Asien</option>

    <option value="North America">Nordamerika</option>

  </select>
  <button class="ctrl-btn" id="toggleTheme" title="Theme wechseln">🌙</button>
  <a href="../index.html" class="ctrl-btn">← Projekte</a>
</div>

<div id="result-info"></div>

  "South America": "S.Amerika",
  "Oceania":       "Ozeanien",
};

const continentClass = {
  "Africa":        "cb-africa",
  "Asia":          "cb-asia",
  "Europe":        "cb-europe",
  "North America": "cb-namerica",
  "South America": "cb-samerica",
  "Oceania":       "cb-oceania",
};

function flagEmoji(code) {
  if (!code || code.length !== 2) return "🏳";
  return [...code.toUpperCase()]
    .map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0)))
    .join('');
}

function buildGrid() {
  const grid = document.getElementById('country-grid');
  grid.innerHTML = '';
  countries.forEach(c => {
    const card = document.createElement('div');
    card.className = 'country-card';
    card.dataset.continent = c.continent;
    card.dataset.name = c.name.toLowerCase();
    card.dataset.capital = c.capital.toLowerCase();
    card.innerHTML = `
      <span class="continent-badge ${continentClass[c.continent]}">${continentLabel[c.continent]}</span>
      <div class="country-flag">${flagEmoji(c.code)}</div>
      <div class="country-name">${c.name}</div>
      <div class="country-capital">🏛 ${c.capital}</div>
    `;
    grid.appendChild(card);
  });
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const continent = document.getElementById('continentFilter').value;
  const cards = document.querySelectorAll('.country-card');
  let visible = 0;
  cards.forEach(card => {
    const matchContinent = !continent || card.dataset.continent === continent;
    const matchSearch = !query ||
      card.dataset.name.includes(query) ||
      card.dataset.capital.includes(query);
    const show = matchContinent && matchSearch;
    card.classList.toggle('hidden-card', !show);
    if (show) visible++;
  });
  const info = document.getElementById('result-info');
  info.textContent = visible === countries.length
    ? `${countries.length} Länder`
    : `${visible} von ${countries.length} Ländern`;
}

// Theme toggle
const btn = document.getElementById('toggleTheme');
const saved = localStorage.getItem('world-theme');
if (saved === 'light') { document.body.classList.add('light'); btn.textContent = '☀️'; }

btn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  btn.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('world-theme', isLight ? 'light' : 'dark');
});

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('continentFilter').addEventListener('change', applyFilters);

buildGrid();
applyFilters();
</script>
</body>
</html>
