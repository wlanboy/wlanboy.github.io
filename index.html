<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Explorer</title>
  <link rel="stylesheet" href="style-neu.css">
</head>
<body>

<header>
  <div class="header-title">Projects Explorer</div>
  <div class="header-sub">Browse my GitHub repositories &amp; documentation</div>
</header>

<div id="controls">
  <div id="search-wrapper">
    <input type="text" id="search" placeholder="Suche…">
  </div>
  <select id="repoFilter">
    <option value="">Alle Repos</option>
  </select>
  <button class="ctrl-btn" id="toggleTheme">🌙/☀️</button>
  <button class="ctrl-btn" id="sortRepo">Sortiere nach Repo</button>
  <a href="./fokus/index.html" id="terminalLink">Focus</a>
  <a href="https://wlanboy.github.io/uhren/index.html" id="terminalLink">Time</a>
</div>

<div id="grid"></div>

<div id="modal" class="hidden">
  <div id="modalContent">
    <button id="modalClose">✕</button>
    <h2 id="modalTitle"></h2>
    <h4 id="modalRepo"></h4>
    <pre id="modalText"></pre>
    <a id="modalLink" href="#" target="_blank" rel="noopener noreferrer">Auf GitHub öffnen</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
