<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini PC Vergleich</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="minipcs.css">
</head>
<body>

<header>Mini PC Vergleich</header>

<div id="controls">
  <button id="toggleTheme">🌙/☀️</button>
  <a href="./index.html" id="terminalLink">← Projekte</a>
</div>

<div id="sort-controls">
  <button class="sort-btn active" data-sort="perf">Nach Leistung ↑</button>
  <button class="sort-btn" data-sort="year">Nach Jahr</button>
  <button class="sort-btn" data-sort="tdpW">Nach Verbrauch ↑</button>
  <button class="sort-btn" data-sort="eff">Nach Effizienz ↑</button>
</div>

<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:#e55555"></span>Einsteiger (&lt;5%)</span>
  <span class="legend-item"><span class="legend-dot" style="background:#d97706"></span>Leicht (5–25%)</span>
  <span class="legend-item"><span class="legend-dot" style="background:#0d9488"></span>Mittel (25–70%)</span>
  <span class="legend-item"><span class="legend-dot" style="background:#16a34a"></span>Leistungsstark (&gt;70%)</span>
  <span class="legend-item"><span class="legend-dot" style="background:#6f42c1"></span>Effizienz (CB/W)</span>
</div>

<div id="grid"></div>

<script src="minipcs.js"></script>
</body>
</html>
