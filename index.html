<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Explorer for my recent projects</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Explorer for my recent projects</header>

<div id="controls">
  <div id="search-wrapper">
    <input type="text" id="search" placeholder="Suche…">
  </div>
  <select id="repoFilter">
    <option value="">Alle Repos</option>
  </select>
  <button id="toggleTheme">🌙/☀️</button>
  <button id="sortRepo">Sortiere nach Repo</button>
  <a href="./fokus/index.html" id="terminalLink">Focus</a>
  <a href="terminal.html" id="terminalLink">Terminal</a>
  <a href="https://wlanboy.github.io/uhren/index.html" id="terminalLink">Time</a>
</div>

<div id="grid"></div>

<!-- Modal für README-Detailansicht -->
<div id="modal" class="hidden">
  <div id="modalContent">
    <button id="modalClose">✖</button>
    <h2 id="modalTitle"></h2>
    <h4 id="modalRepo"></h4>
    <pre id="modalText"></pre>
    <a id="modalLink" href="#" target="_blank" rel="noopener noreferrer">Auf GitHub öffnen</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
