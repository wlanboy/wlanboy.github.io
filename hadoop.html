<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hadoop</title>
  <link rel="stylesheet" href="focus-style.css">
</head>
<body>

  <header>
    <a href="index.html" class="back-link">← Explorer</a>
    <h1>Hadoop</h1>
    <button id="toggleTheme">☀️</button>
  </header>

  <div id="main">

    <div id="carousel-section">
      <div id="groups-track-wrapper">
        <div id="groups-track"></div>
      </div>
      <div id="groups-dots"></div>

    <!-- Topic list with inline accordion -->
    <div id="topics-section">
      <div id="topics-header">
        <span id="topics-title"></span>
      </div>
      <div id="topics-list"></div>
    </div>

  </div>

  <script src="hadoop.js"></script>
